<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Vendor Price Comparison{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="{{ url_for('comparison') }}">
      <i class="bi bi-bar-chart-line-fill me-2"></i>Price Comparison
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'comparison' %}active{% endif %}"
             href="{{ url_for('comparison') }}">
            <i class="bi bi-table me-1"></i>Compare Prices
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint in ('vendors','vendor_detail','upload') %}active{% endif %}"
             href="{{ url_for('vendors') }}">
            <i class="bi bi-truck me-1"></i>Vendors
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'canonical_cuts' %}active{% endif %}"
             href="{{ url_for('canonical_cuts') }}">
            <i class="bi bi-tags me-1"></i>Cut Names
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container-fluid py-4 px-4">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} alert-dismissible fade show" role="alert">
        {{ msg }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
