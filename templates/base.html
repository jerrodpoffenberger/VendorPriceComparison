<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1c1a18">
  <title>{% block title %}Vendor Price Comparison{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <!-- Bootstrap modal + form utilities only -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    /* Scope Bootstrap resets so they don't clobber our custom styles */
    body { font-family: 'Segoe UI', Arial, sans-serif !important; background: #f0f2f5 !important; }
    .modal-header { background: #2c3e50; color: white; }
    .modal-header .btn-close { filter: invert(1); }
    .form-control:focus, .form-select:focus { border-color: #8b0000; box-shadow: 0 0 0 2px rgba(139,0,0,0.12); }
  </style>
</head>
<body>

<header id="main-header">
  <div class="header-brand">
    <span class="header-icon">🥩</span>
    <h1>Vendor Price Comparison</h1>
  </div>
  <button class="hamburger-btn" onclick="toggleMobileMenu()" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <nav>
    <a href="{{ url_for('comparison') }}"
       class="nav-btn {% if request.endpoint == 'comparison' %}active{% endif %}">
      Compare Prices
    </a>
    <a href="{{ url_for('vendors') }}"
       class="nav-btn {% if request.endpoint in ('vendors','vendor_detail','upload','column_picker','cut_mapper') %}active{% endif %}">
      Vendors
    </a>
    <a href="{{ url_for('canonical_cuts') }}"
       class="nav-btn {% if request.endpoint == 'canonical_cuts' %}active{% endif %}">
      Cut Names
    </a>
  </nav>
</header>

<main>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function toggleMobileMenu() {
  document.getElementById('main-header').classList.toggle('nav-open');
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
